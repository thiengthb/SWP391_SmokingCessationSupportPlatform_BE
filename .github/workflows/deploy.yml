name: Deploy Spring Boot to EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up JDK for Spring Boot
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Build the Spring Boot application
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # Log in to DockerHub
      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build and push Docker image
      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/my-spring-boot-app:${{ github.sha }} .
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/my-spring-boot-app:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/my-spring-boot-app:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/my-spring-boot-app:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/my-spring-boot-app:latest

      # Deploy to EC2
      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          # Install SSH key
          echo "$EC2_SSH_KEY" > ssh_key.pem
          chmod 400 ssh_key.pem
          
          # SSH into EC2 and deploy
          ssh -o StrictHostKeyChecking=no -i ssh_key.pem $EC2_USER@$EC2_HOST << 'EOF'
            # Log in to DockerHub
            docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }}
          
            # Stop and remove existing container if it exists
            docker stop my-spring-boot-container || true
            docker rm my-spring-boot-container || true
          
            # Pull the latest image
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/my-spring-boot-app:latest
          
            # Run the new container
            docker run -d --name my-spring-boot-container -p 8080:8080 ${{ secrets.DOCKERHUB_USERNAME }}/my-spring-boot-app:latest
          
            # Clean up unused images
            docker image prune -f
          EOF
          
          # Clean up SSH key
          rm ssh_key.pem